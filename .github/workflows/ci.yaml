name: nextgen-ecom CI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            277028125148.dkr.ecr.eu-west-1.amazonaws.com/nextgen-ecom:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e

            IMAGE=277028125148.dkr.ecr.eu-west-1.amazonaws.com/nextgen-ecom

            aws ecr get-login-password --region eu-west-1 | \
            docker login --username AWS --password-stdin \
            277028125148.dkr.ecr.eu-west-1.amazonaws.com

            docker pull $IMAGE

            docker stop nextgen-ecom || true
            docker rm nextgen-ecom || true

            docker run -d \
              --restart unless-stopped \
              --name nextgen-ecom \
              -p 127.0.0.1:6000:3000 \
              $IMAGE

            sleep 5
            docker logs nextgen-ecom --tail 50

            echo "Cleaning old images..."
            docker image prune -af
